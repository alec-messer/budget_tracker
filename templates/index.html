<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- LEFT PANEL: ADD TRANSACTION -->
<div id="sidePanel" class="side-panel">
    <h2>Add Transaction</h2>

    <input id="txName" placeholder="Name">
    <input id="txAmount" type="number" step="any" placeholder="Amount">

    <select id="txType">
        <option value="out">Expense</option>
        <option value="in">Income</option>
    </select>

    <button onclick="addTransaction()">Add</button>
</div>

<!-- RIGHT PANEL: NEW MONTH -->
<div id="monthPanel" class="side-panel right-panel">
    <h2>New Month</h2>

    <input id="pay" placeholder="Monthly Pay" type="number">
    <input id="balance" placeholder="Starting Balance" type="number">
    <input id="savings" placeholder="Savings" type="number">

    <button onclick="startNewMonth()">Reset</button>
</div>

<!-- BUTTONS -->
<button class="panel-handle" onclick="togglePanel()">+</button>
<button class="right-handle" onclick="toggleMonthPanel()">⟳</button>

<div class="app">

    <h1 id="balanceDisplay">£{{ state.balance }}</h1>

    <div id="transactions">
        {% for t in transactions %}
        <div class="tx {{ t.type }}">
            <span>{{ t.name }}</span>
            <span>£{{ t.amount }}</span>
        </div>
        {% endfor %}
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
