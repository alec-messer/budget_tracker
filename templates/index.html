<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- LEFT PANEL: ADD TRANSACTION -->
<div id="sidePanel" class="side-panel">
    <div class="panel-content">

        <h2>Add Transaction</h2>

        <input id="txName" placeholder="Name">
        <input id="txAmount" type="number" step="any" placeholder="Amount">

        <select id="txType">
            <option value="out">Expense</option>
            <option value="in">Income</option>
        </select>

        <button onclick="addTransaction()">Add transaction</button>

    </div>
</div>

<!-- RIGHT PANEL: NEW MONTH -->
<div id="monthPanel" class="side-panel right-panel">
    <div class="panel-content">

        <h2>New Month</h2>

        <input id="pay" type="number" placeholder="Monthly pay">
        <input id="balance" type="number" placeholder="Remaining balance">
        <input id="savings" type="number" placeholder="Savings balance">

        <button onclick="startNewMonth()">Reset month</button>

    </div>
</div>

<!-- BUTTONS (USING ORIGINAL RELIABLE PATTERN) -->
<button class="panel-handle" onclick="togglePanel()">+</button>
<button class="right-handle" onclick="toggleMonthPanel()">-</button>

<!-- MAIN APP -->
<div class="app">

    <div class="balance">
        £{{ '%.2f'|format(state.balance) }}
    </div>

    <div id="transactions">
        {% for t in transactions %}
        <div class="tx {{ t.type }}">
            <span>{{ t.name }}</span>
            <span>£{{ '%.2f'|format(t.amount) }}</span>
        </div>
        {% endfor %}
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
